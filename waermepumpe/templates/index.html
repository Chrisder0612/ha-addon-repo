<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wärmepumpen Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0e0f10;
      --surface: #161718;
      --border: #2a2b2d;
      --amber: #f5a623;
      --amber-dim: #7a5212;
      --blue: #4ea8de;
      --red: #e05c5c;
      --green: #5cb85c;
      --text: #d4d4d4;
      --text-dim: #666;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
    }
    .logo-flame { font-size: 22px; }
    header h1 {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--amber);
      text-transform: uppercase;
    }
    header span {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
      letter-spacing: 0.05em;
    }

    /* ── LAYOUT ── */
    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── FORM ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--amber);
      padding: 24px;
      margin-bottom: 28px;
    }
    .form-card h2 {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--amber);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--amber); }
    .field-notiz { grid-column: 1 / -1; }
    .btn-save {
      background: var(--amber);
      color: #000;
      border: none;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 28px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }
    .toast {
      display: inline-block;
      margin-left: 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    .toast.ok { color: var(--green); }
    .toast.err { color: var(--red); }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px;
    }
    .stat-box .label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat-box .val {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--amber);
    }
    .stat-box .unit {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-left: 4px;
    }

    /* ── CHARTS ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
    }
    .chart-card h3 {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .chart-card canvas { max-height: 240px; }

    /* ── TABLE ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow-x: auto;
    }
    .table-card h2 {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--amber);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #1e1f20; transition: background 0.1s; }
    tbody tr:hover { background: #1c1d1f; }
    tbody td {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 10px 14px;
      white-space: nowrap;
    }
    td.amber { color: var(--amber); }
    td.blue  { color: var(--blue); }
    td.red   { color: var(--red); }
    td.green { color: var(--green); }
    .btn-del {
      background: none;
      border: 1px solid #3a1a1a;
      color: #7a3333;
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-del:hover { border-color: var(--red); color: var(--red); }
    .empty-hint {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      padding: 40px;
    }
  </style>
</head>
<body>

<header>
  <span class="logo-flame">🔥</span>
  <h1>Wärmepumpen Monitor</h1>
  <span id="clock">──</span>
</header>

<main>

  <!-- FORM -->
  <div class="form-card">
    <h2>// Neuer Eintrag</h2>
    <div class="form-grid">
      <div class="field">
        <label>Datum</label>
        <input type="date" id="f_datum" />
      </div>
      <div class="field">
        <label>Verbrauch (kWh)</label>
        <input type="number" id="f_verbrauch" step="0.01" placeholder="z.B. 12.5" />
      </div>
      <div class="field">
        <label>Energieleistung (kW)</label>
        <input type="number" id="f_energie" step="0.01" placeholder="z.B. 5.2" />
      </div>
      <div class="field">
        <label>Außentemp. (°C)</label>
        <input type="number" id="f_temp" step="0.1" placeholder="z.B. -3.5" />
      </div>
      <div class="field">
        <label>JAZ</label>
        <input type="number" id="f_jaz" step="0.01" placeholder="z.B. 3.8" />
      </div>
      <div class="field field-notiz">
        <label>Notiz (optional)</label>
        <input type="text" id="f_notiz" placeholder="z.B. Frostnacht, Heizung voll" />
      </div>
    </div>
    <button class="btn-save" onclick="speichern()">Eintrag speichern</button>
    <span class="toast" id="toast"></span>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="stats-row"></div>

  <!-- CHARTS -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3>// Verbrauch &amp; Energieleistung</h3>
      <canvas id="chartVerbrauch"></canvas>
    </div>
    <div class="chart-card">
      <h3>// JAZ vs. Außentemperatur</h3>
      <canvas id="chartJaz"></canvas>
    </div>
    <div class="chart-card">
      <h3>// Außentemperatur</h3>
      <canvas id="chartTemp"></canvas>
    </div>
    <div class="chart-card">
      <h3>// JAZ-Verlauf</h3>
      <canvas id="chartJazLine"></canvas>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <h2>// Datensätze</h2>
    <div id="table-container">
      <p class="empty-hint">Noch keine Einträge.</p>
    </div>
  </div>

</main>

<script>
let daten = [];
let charts = {};

// ── CLOCK ──
function clock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleDateString("de-DE") + " · " + now.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
}
clock();
setInterval(clock, 30000);

// ── DEFAULT DATE ──
document.getElementById("f_datum").value = new Date().toISOString().split("T")[0];

// ── LOAD ──
async function laden() {
  const res = await fetch("/api/eintraege");
  daten = await res.json();
  rendern();
}

// ── SAVE ──
async function speichern() {
  const body = {
    datum: document.getElementById("f_datum").value,
    verbrauch: document.getElementById("f_verbrauch").value,
    energieleistung: document.getElementById("f_energie").value,
    aussentemp: document.getElementById("f_temp").value,
    jaz: document.getElementById("f_jaz").value,
    notiz: document.getElementById("f_notiz").value
  };
  const res = await fetch("/api/eintraege", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  const toast = document.getElementById("toast");
  if (res.ok) {
    toast.textContent = "✓ Gespeichert";
    toast.className = "toast ok show";
    ["f_verbrauch","f_energie","f_temp","f_jaz","f_notiz"].forEach(id =>
      document.getElementById(id).value = "");
    await laden();
  } else {
    const err = await res.json();
    toast.textContent = "✗ " + (err.fehler || "Fehler");
    toast.className = "toast err show";
  }
  setTimeout(() => toast.classList.remove("show"), 2500);
}

// ── DELETE ──
async function loeschen(id) {
  if (!confirm("Eintrag löschen?")) return;
  await fetch("/api/eintraege/" + id, { method: "DELETE" });
  await laden();
}

// ── CHART HELPER ──
const C = (id) => document.getElementById(id).getContext("2d");
const gridColor = "#2a2b2d";
const baseOpts = {
  responsive: true,
  maintainAspectRatio: true,
  plugins: { legend: { labels: { color: "#666", font: { family: "IBM Plex Mono", size: 11 } } } },
  scales: {
    x: { ticks: { color: "#555", font: { family: "IBM Plex Mono", size: 10 } }, grid: { color: gridColor } },
    y: { ticks: { color: "#555", font: { family: "IBM Plex Mono", size: 10 } }, grid: { color: gridColor } }
  }
};

function zerstöreCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

function renderCharts(d) {
  zerstöreCharts();
  if (!d.length) return;

  const labels = d.map(e => e.datum);

  // Chart 1: Verbrauch + Energieleistung
  charts.v = new Chart(C("chartVerbrauch"), {
    type: "bar",
    data: {
      labels,
      datasets: [
        { label: "Verbrauch (kWh)", data: d.map(e => e.verbrauch), backgroundColor: "#f5a62388", borderColor: "#f5a623", borderWidth: 1 },
        { label: "Leistung (kW)", data: d.map(e => e.energieleistung), backgroundColor: "#4ea8de55", borderColor: "#4ea8de", borderWidth: 1 }
      ]
    },
    options: { ...baseOpts }
  });

  // Chart 2: JAZ vs Außentemp (Scatter)
  charts.s = new Chart(C("chartJaz"), {
    type: "scatter",
    data: {
      datasets: [{
        label: "JAZ / Temp",
        data: d.map(e => ({ x: e.aussentemp, y: e.jaz })),
        backgroundColor: "#f5a623cc",
        pointRadius: 6,
        pointHoverRadius: 9
      }]
    },
    options: {
      ...baseOpts,
      scales: {
        x: { ...baseOpts.scales.x, title: { display: true, text: "Außentemp. (°C)", color: "#555", font: { family: "IBM Plex Mono", size: 10 } } },
        y: { ...baseOpts.scales.y, title: { display: true, text: "JAZ", color: "#555", font: { family: "IBM Plex Mono", size: 10 } } }
      }
    }
  });

  // Chart 3: Außentemperatur Verlauf
  charts.t = new Chart(C("chartTemp"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Außentemp. (°C)",
        data: d.map(e => e.aussentemp),
        borderColor: "#e05c5c",
        backgroundColor: "#e05c5c22",
        fill: true,
        tension: 0.4,
        pointRadius: 4
      }]
    },
    options: { ...baseOpts }
  });

  // Chart 4: JAZ Linie
  charts.j = new Chart(C("chartJazLine"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "JAZ",
        data: d.map(e => e.jaz),
        borderColor: "#5cb85c",
        backgroundColor: "#5cb85c22",
        fill: true,
        tension: 0.4,
        pointRadius: 4
      }]
    },
    options: { ...baseOpts }
  });
}

// ── STATS ──
function renderStats(d) {
  const el = document.getElementById("stats-row");
  if (!d.length) { el.innerHTML = ""; return; }

  const avg = k => (d.reduce((s, e) => s + e[k], 0) / d.length).toFixed(2);
  const minTemp = Math.min(...d.map(e => e.aussentemp)).toFixed(1);
  const maxJaz = Math.max(...d.map(e => e.jaz)).toFixed(2);
  const sumV = d.reduce((s, e) => s + e.verbrauch, 0).toFixed(1);

  el.innerHTML = `
    <div class="stat-box"><div class="label">Einträge</div><div class="val">${d.length}</div></div>
    <div class="stat-box"><div class="label">Gesamt Verbrauch</div><div class="val">${sumV}<span class="unit">kWh</span></div></div>
    <div class="stat-box"><div class="label">Ø Verbrauch</div><div class="val">${avg("verbrauch")}<span class="unit">kWh</span></div></div>
    <div class="stat-box"><div class="label">Ø Leistung</div><div class="val">${avg("energieleistung")}<span class="unit">kW</span></div></div>
    <div class="stat-box"><div class="label">Min. Außentemp</div><div class="val">${minTemp}<span class="unit">°C</span></div></div>
    <div class="stat-box"><div class="label">Max. JAZ</div><div class="val">${maxJaz}</div></div>
    <div class="stat-box"><div class="label">Ø JAZ</div><div class="val">${avg("jaz")}</div></div>
  `;
}

// ── TABLE ──
function renderTabelle(d) {
  const el = document.getElementById("table-container");
  if (!d.length) { el.innerHTML = '<p class="empty-hint">Noch keine Einträge.</p>'; return; }

  el.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Datum</th>
          <th>Verbrauch (kWh)</th>
          <th>Leistung (kW)</th>
          <th>Außentemp. (°C)</th>
          <th>JAZ</th>
          <th>Notiz</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${d.map(e => `
          <tr>
            <td>${e.datum}</td>
            <td class="amber">${e.verbrauch.toFixed(2)}</td>
            <td class="blue">${e.energieleistung.toFixed(2)}</td>
            <td class="red">${e.aussentemp.toFixed(1)}</td>
            <td class="green">${e.jaz.toFixed(2)}</td>
            <td style="color:#888;font-size:11px">${e.notiz || "—"}</td>
            <td><button class="btn-del" onclick="loeschen(${e.id})">DEL</button></td>
          </tr>`).join("")}
      </tbody>
    </table>`;
}

// ── RENDER ALL ──
function rendern() {
  renderStats(daten);
  renderCharts(daten);
  renderTabelle(daten);
}

laden();
</script>
</body>
</html>
